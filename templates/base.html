{% import "macros/macros.html" as post_macros %}

<!DOCTYPE html>
<html lang="{{lang}}">
{% include "partials/header.html" %}

<body>
    <div class="content">
        {% include "partials/head.html" %}

        <div id="page-container">
            {% block content %}{% endblock content %}
        </div>

        {% include "partials/footer.html" %}
    </div>

    <script>
        (() => {
            const container = document.getElementById("page-container");
            if (!container || !window.history || !window.DOMParser) return;

            const navLinks = Array.from(document.querySelectorAll("header nav a, #main_title a"));
            const origin = window.location.origin;

            if ("scrollRestoration" in history) {
                history.scrollRestoration = "manual";
            }

            const sameOrigin = (href) => {
                try {
                    const url = new URL(href, window.location.href);
                    return url.origin === origin;
                } catch {
                    return false;
                }
            };

            const normalizePath = (url) => {
                try {
                    const u = new URL(url, origin);
                    const path = u.pathname.replace(/\/+$/, "");
                    return path === "" ? "/" : path;
                } catch {
                    return "/";
                }
            };

            const setActiveNav = (url) => {
                const targetPath = normalizePath(url);
                navLinks.forEach((link) => {
                    const linkPath = normalizePath(link.href);
                    const isRoot = linkPath === "/";
                    const matches = isRoot
                        ? targetPath === "/"
                        : targetPath === linkPath || targetPath.startsWith(linkPath + "/");
                    link.classList.toggle("active", matches);
                });
            };

            const swapContent = (doc, url, replace = false) => {
                const next = doc.getElementById("page-container");
                if (!next) {
                    window.location.href = url;
                    return;
                }

                const nextTitle = doc.querySelector("title");
                container.innerHTML = next.innerHTML;
                if (nextTitle) document.title = nextTitle.textContent;
                setActiveNav(url);

                if (!replace) {
                    history.pushState({ url }, "", url);
                }

                window.scrollTo(0, 0);
            };

            const loadPage = async (url, replace = false) => {
                try {
                    const response = await fetch(url, { headers: { "X-Requested-With": "fetch" } });
                    if (!response.ok) throw new Error("Failed request");
                    const html = await response.text();
                    const doc = new DOMParser().parseFromString(html, "text/html");
                    swapContent(doc, url, replace);
                } catch (err) {
                    console.error("Navigation failed, falling back:", err);
                    window.location.href = url;
                }
            };

            const onNavClick = (event) => {
                const link = event.currentTarget;
                const href = link.getAttribute("href");

                if (!href || href.startsWith("#") || !sameOrigin(href)) return;
                if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey || event.button !== 0) return;

                event.preventDefault();
                const targetUrl = new URL(href, window.location.href).toString();
                loadPage(targetUrl);
            };

            navLinks.forEach((link) => link.addEventListener("click", onNavClick));
            setActiveNav(window.location.href);

            window.addEventListener("popstate", (event) => {
                const url = event.state?.url || window.location.href;
                loadPage(url, true);
            });

            history.replaceState({ url: window.location.href }, "", window.location.href);
        })();
    </script>
</body>

</html>
